name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# GitHub Pages 배포에 필요한 권한
permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 방지
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (static export)
        run: npm run build
        env:
          # 프로젝트 페이지 서브경로: https://<user>.github.io/sampleAR-lavan/
          NEXT_PUBLIC_BASE_PATH: /sampleAR-lavan
          # 카카오맵 JavaScript 키 — 레포 Secret 으로 주입 (코드/워크플로에 하드코딩 금지).
          # Settings → Secrets and variables → Actions → New repository secret
          #   Name: NEXT_PUBLIC_KAKAO_MAP_KEY
          NEXT_PUBLIC_KAKAO_MAP_KEY: ${{ secrets.NEXT_PUBLIC_KAKAO_MAP_KEY }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
